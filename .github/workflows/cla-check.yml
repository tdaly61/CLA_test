name: CLA contributor check

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

jobs:
  check-contributor-membership:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      statuses: write

    steps:
      - name: Check contributor team membership
        id: check
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.ORG_PAT }}
          script: |
            const author = context.payload.pull_request.user.login;
            const org = 'openMF';
            const teams = ['contributors', 'contracted-contributors'];

            // Skip bots
            if (context.payload.pull_request.user.type === 'Bot') {
              console.log('Bot PR — skipping check');
              return;
            }

            // Check membership in either team
            let isMember = false;
            let matchedTeam = null;
            for (const team of teams) {
              try {
                const resp = await github.rest.teams.getMembershipForUserInOrg({
                  org,
                  team_slug: team,
                  username: author,
                });
                if (resp.data.state === 'active') {
                  isMember = true;
                  matchedTeam = team;
                  break;
                }
              } catch (e) {
                // 404 = not a member, continue
              }
            }

            if (!isMember) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                body: `👋 Hi @${author} — thank you for your pull request.\n\n` +
                      `**This PR is currently blocked** because we do not have a Contributor License Agreement (CLA) on file for your GitHub account.\n\n` +
                      `To get unblocked:\n` +
                      `1. Contact the Mifos team at contribute@mifos.org\n` +
                      `2. Complete the CLA signing process\n` +
                      `3. Once verified, you will be added to the approved contributors list and this PR will be cleared\n\n` +
                      `_No action is needed from you on this PR until that step is complete._`
              });

              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.pull_request.number,
                labels: ['cla-required']
              });

              core.setFailed(
                `@${author} is not a member of the 'contributors' or 'contracted-contributors' team. ` +
                `CLA signature required before this PR can be merged.`
              );

            } else {
              console.log(`@${author} is verified via '${matchedTeam}' team ✓`);

              // Remove cla-required label if it was previously added
              try {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: 'cla-required'
                });
              } catch (e) {
                // Label may not exist — that's fine
              }
            }
